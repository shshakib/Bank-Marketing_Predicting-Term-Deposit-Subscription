model:
  name: bank_deposit_model
  target_variable: deposit
  best_model: GradientBoosting
  test_size: 0.2
  random_state: 85
  production_notes:
    - duration is excluded because it is only known after a customer call.
    - pdays is excluded because the -1 value dominates and is less reliable for production scoring.
    - default, housing, and loan are label-encoded as binary indicators.
    - categorical variables are one-hot encoded with the first level dropped to avoid duplicate dummy columns.
  parameters:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 7
    min_samples_leaf: 5
    min_samples_split: 2
    random_state: 85
experiments:
  random_state: 85
  cv_folds: 5
  mccv_iterations: 100
  scenarios:
    no_duration:
      drop_columns: [duration, pdays]
    with_duration:
      drop_columns: [pdays]
  random_forest_grid:
    max_features: [3, 4, 5, 6]
    n_estimators: [500, 1000]
  gbm_grid:
    n_estimators: [300, 500, 1000]
    learning_rate: [0.01, 0.05, 0.1]
    max_depth: [3, 5, 7]
    min_samples_leaf: [5, 10, 20]
